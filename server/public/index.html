<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MeshAlert Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: system-ui, sans-serif; min-height: 100vh; }
  header { background: #111118; border-bottom: 1px solid #1e293b; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 1px; }
  header .subtitle { font-size: 12px; color: #64748b; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #16a34a; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 20px 24px; }
  .stat { background: #111118; border: 1px solid #1e293b; border-radius: 10px; padding: 16px; text-align: center; }
  .stat .val { font-size: 28px; font-weight: 800; }
  .stat .lbl { font-size: 12px; color: #64748b; margin-top: 4px; }
  .feed { padding: 0 24px 24px; }
  .feed h2 { font-size: 14px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .card { background: #111118; border: 1px solid #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 10px; border-left: 4px solid #1e293b; }
  .card.MEDICAL { border-left-color: #dc2626; }
  .card.TRAPPED { border-left-color: #f97316; }
  .card.SAFE    { border-left-color: #16a34a; }
  .card.HEARTBEAT { border-left-color: #3b82f6; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-type { font-size: 12px; font-weight: 800; letter-spacing: 1px; }
  .card-type.MEDICAL { color: #dc2626; }
  .card-type.TRAPPED { color: #f97316; }
  .card-type.SAFE    { color: #16a34a; }
  .card-type.HEARTBEAT { color: #3b82f6; }
  .card-age { font-size: 11px; color: #64748b; }
  .card-sender { font-size: 13px; font-weight: 600; color: #e2e8f0; margin-bottom: 4px; }
  .card-coords { font-size: 12px; color: #94a3b8; font-family: monospace; }
  .card-msg { font-size: 13px; color: #cbd5e1; font-style: italic; margin-top: 6px; }
  .card-meta { font-size: 11px; color: #64748b; margin-top: 4px; }
  .empty { text-align: center; padding: 60px 20px; color: #475569; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }
  .badge { font-size: 11px; background: rgba(59,130,246,0.15); color: #93c5fd; padding: 2px 8px; border-radius: 10px; }
  #conn-status { font-size: 12px; color: #64748b; margin-left: auto; display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<header>
  <div class="status-dot" id="dot"></div>
  <div>
    <h1>MeshAlert Dashboard</h1>
    <div class="subtitle">Offline disaster relief mesh network</div>
  </div>
  <div id="conn-status">⬤ Connecting...</div>
</header>

<div class="stats">
  <div class="stat"><div class="val" id="s-total" style="color:#e2e8f0">0</div><div class="lbl">Total Alerts</div></div>
  <div class="stat"><div class="val" id="s-medical" style="color:#dc2626">0</div><div class="lbl">Medical</div></div>
  <div class="stat"><div class="val" id="s-trapped" style="color:#f97316">0</div><div class="lbl">Trapped</div></div>
  <div class="stat"><div class="val" id="s-safe" style="color:#16a34a">0</div><div class="lbl">Safe</div></div>
</div>

<div class="feed">
  <h2>Live Feed</h2>
  <div id="feed"></div>
</div>

<script>
  let messages = [];

  function fmtAge(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    return Math.floor(m / 60) + 'h ago';
  }

  function renderCard(msg) {
    const type = msg.emergencyType ?? msg.type ?? 'SOS';
    const age = fmtAge(msg.timestamp);
    const lat = msg.payload?.latitude?.toFixed(5);
    const lng = msg.payload?.longitude?.toFixed(5);
    return `
      <div class="card ${type}">
        <div class="card-header">
          <span class="card-type ${type}">${type === 'HEARTBEAT' ? '💓 HEARTBEAT' : '🆘 ' + type}</span>
          <span class="card-age">${age}</span>
        </div>
        <div class="card-sender">${msg.senderName ?? 'Unknown'} <span class="badge">${(msg.senderId ?? '').slice(-6)}</span></div>
        ${lat ? `<div class="card-coords">📍 ${lat}, ${lng}</div>` : ''}
        ${msg.payload?.message ? `<div class="card-msg">"${msg.payload.message}"</div>` : ''}
        ${msg.payload?.bloodGroup ? `<div class="card-meta">🩸 ${msg.payload.bloodGroup}</div>` : ''}
        <div class="card-meta">${Array.isArray(msg.hops) ? msg.hops.length : (msg.hops ?? 0)} hops · TTL ${msg.ttl ?? '?'} · ${new Date(msg.timestamp).toLocaleTimeString()}</div>
      </div>`;
  }

  function updateStats() {
    const sos = messages.filter(m => m.type === 'SOS');
    document.getElementById('s-total').textContent = sos.length;
    document.getElementById('s-medical').textContent = sos.filter(m => m.emergencyType === 'MEDICAL').length;
    document.getElementById('s-trapped').textContent = sos.filter(m => m.emergencyType === 'TRAPPED').length;
    document.getElementById('s-safe').textContent = sos.filter(m => m.emergencyType === 'SAFE').length;
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    if (messages.length === 0) {
      feed.innerHTML = '<div class="empty"><div class="icon">📭</div><p>No alerts yet — waiting for phone sync...</p></div>';
      return;
    }
    feed.innerHTML = messages.map(renderCard).join('');
  }

  function connect() {
    const es = new EventSource('/api/events');
    const status = document.getElementById('conn-status');
    const dot = document.getElementById('dot');

    es.addEventListener('init', e => {
      messages = JSON.parse(e.data);
      updateStats(); renderFeed();
      status.textContent = '⬤ Live';
      status.style.color = '#16a34a';
      dot.style.background = '#16a34a';
      // Also fetch current tunnel URL
      fetch('/api/tunnel-url').then(r=>r.json()).then(d=>{ if(d.url) showTunnelUrl(d.url); });
    });

    es.addEventListener('tunnel', e => {
      const { url } = JSON.parse(e.data);
      if (url) showTunnelUrl(url);
    });

    es.addEventListener('sos', e => {
      const msg = JSON.parse(e.data);
      if (!messages.find(m => m.messageId === msg.messageId)) {
        messages.unshift(msg);
        updateStats(); renderFeed();
        // Flash dot
        dot.style.background = '#dc2626';
        setTimeout(() => dot.style.background = '#16a34a', 1000);
      }
    });

    es.onerror = () => {
      status.textContent = '⬤ Reconnecting...';
      status.style.color = '#f97316';
      dot.style.background = '#f97316';
    };
  }

  function showTunnelUrl(url) {
    let box = document.getElementById('tunnel-box');
    if (!box) {
      box = document.createElement('div');
      box.id = 'tunnel-box';
      box.style.cssText = 'background:#0f2a1a;border:1px solid #16a34a;border-radius:10px;padding:14px 20px;margin:0 24px 16px;';
      document.querySelector('.feed').prepend(box);
    }
    box.innerHTML = `<div style="font-size:11px;color:#16a34a;font-weight:800;letter-spacing:1px;margin-bottom:6px">PUBLIC URL — ENTER THIS IN APP SETTINGS</div><div style="font-size:14px;color:#fff;font-family:monospace;word-break:break-all">${url}</div>`;
  }

  // Refresh ages every 30s
  setInterval(() => { if (messages.length) renderFeed(); }, 30000);

  connect();
</script>
</body>
</html>
